{% extends "base.html" %}

{% block title %}Восстановление пароля | EduPlatform{% endblock %}

{% block content %}
<div class="card">
    <h1>Восстановление пароля</h1>
    <p class="muted">Введите email, указанный при регистрации. Мы отправим инструкцию по смене пароля.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Отправить инструкции</button>
    </form>
</div>
{% endblock %}
