<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EduPlatform{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f6fb; color: #1a1f36; }
        header { background: #243b6b; color: #fff; padding: 1rem 2rem; }
        .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
        .brand { color: #fff; text-decoration: none; font-weight: 700; font-size: 1.1rem; white-space: nowrap; }
        nav { display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; }
        nav a, nav button { color: #fff; text-decoration: none; background: transparent; border: none; cursor: pointer; font-size: 1rem; padding: 0; line-height: 1.2; }
        .logout-form { margin: 0; display: flex; align-items: center; }
        main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: #fff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 6px 18px rgba(0,0,0,.06); }
        form p { margin-bottom: 1rem; }
        input { width: 100%; padding: .6rem; border: 1px solid #ccd4e2; border-radius: 8px; }
        button, .btn { background: #3659a2; color: #fff; border: none; border-radius: 8px; padding: .7rem 1rem; text-decoration: none; display: inline-block; }
        .muted { color: #5b6787; }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <a class="brand" href="{% url 'home' %}">EduPlatform</a>
        <nav>
            <a href="{% url 'home' %}">Главная</a>
            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}">Профиль</a>
                <form action="{% url 'logout' %}" method="post" class="logout-form">
                    {% csrf_token %}
                    <button type="submit">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'signup' %}">Регистрация</a>
                <a href="{% url 'login' %}">Вход</a>
            {% endif %}
            <a href="{% url 'password_reset' %}">Восстановить пароль</a>
        </nav>
    </div>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
