{% extends "base.html" %}

{% block title %}Регистрация | EduPlatform{% endblock %}

{% block content %}
<div class="card">
    <h1>Регистрация пользователя</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Зарегистрироваться</button>
    </form>
    <p class="muted">Уже есть аккаунт? <a href="{% url 'login' %}">Войдите</a>.</p>
</div>
{% endblock %}
