{% extends "base.html" %}

{% block title %}Смена пароля | EduPlatform{% endblock %}

{% block content %}
<div class="card">
    <h1>Смена пароля</h1>
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Сохранить новый пароль</button>
        </form>
    {% else %}
        <p class="muted">Ссылка недействительна. Запросите восстановление пароля снова.</p>
        <a class="btn" href="{% url 'password_reset' %}">Запросить повторно</a>
    {% endif %}
</div>
{% endblock %}
